<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Zombie Bio-Lab Level</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      canvas {
        display: block;
      }

      /* ── Three.js canvas: hidden until game starts, sits behind all UI ── */
      body > canvas {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
      }
      body.game-active > canvas {
        display: block;
      }

      /* ── React root: visible by default, hidden when game starts ── */
      #root {
        position: relative;
        z-index: 1;
      }
      body.game-active #root {
        display: none;
      }

      /* ── All game UI: hidden by default ── */
      #loadingScreen,
      #blocker,
      #elevatorTimer,
      #pauseOverlay,
      #gameOverOverlay,
      #levelDisplay,
      #objectiveDisplay,
      #healthVignette,
      #weaponDisplay {
        display: none;
      }

      /* ── Game UI shown when game is active ── */
      /* Always-on HUD elements */
      body.game-active #levelDisplay,
      body.game-active #objectiveDisplay,
      body.game-active #healthVignette,
      body.game-active #weaponDisplay {
        display: block;
        position: fixed;
        z-index: 50;
      }

      /* Blocker / instructions (pointer lock screen) */
      body.game-active #blocker {
        display: flex;
        position: fixed;
        z-index: 400;
      }

      /* Loading screen */
      body.game-active #loadingScreen {
        display: flex;
        position: fixed;
        z-index: 500;
      }

      /* Elevator timer — shown/hidden by JS, but needs z-index ready */
      body.game-active #elevatorTimer {
        display: block;
        position: fixed;
        z-index: 200;
      }

      /* Pause + Game Over: JS controls display, we just set z-index */
      body.game-active #pauseOverlay {
        position: fixed;
        z-index: 500;
        /* display toggled by JS (KeyP) */
      }
      body.game-active #gameOverOverlay {
        position: fixed;
        z-index: 1000;
        /* display toggled by JS (endGame) */
      }

      /* ── Back-to-menu button (shown when game-active) ── */
      #game-back-btn {
        display: none;
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        padding: 6px 14px;
        cursor: pointer;
        font-family: 'HelpMe', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
      }
      body.game-active #game-back-btn {
        display: block;
      }
      #game-back-btn:hover {
        background: rgba(0, 0, 0, 0.9);
        border-color: rgba(255, 255, 255, 0.4);
      }
    </style>
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>
  <body>

    <!-- React app root -->
    <div id="root"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.179.1/examples/jsm/"
        }
      }
    </script>
    <script src="/AchievementTracker.js"></script>
    <script type="module" src="/game.js"></script>
    <script type="module" src="/src/main.tsx"></script>

    
  </body>
</html>
